theme:
  name: material
  language: zh
  custom_dir: overrides
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  icon:
    logo: material/book-open-variant
    repo: fontawesome/brands/github

plugins:
  - search
  - rss:
      length: 999999
      abstract_chars_count: -1
      # 自定义 XSL（docs/rss.xsl）
      stylesheet: rss.xsl
      image: https://ycvenopyer.github.io/my-blog/assets/images/favicon.png
      pretty_print: true
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      locale: zh
      timezone: Asia/Shanghai
      type: custom
      # %-m / %-d：与常见中文习惯一致
      custom_format: "%Y年%-m月%-d日 %H:%M:%S"
      strict: false
  - statistics:
      page_statistics: true
      page_read_time: true
      page_images: true
      page_template: templates/page_statistics.html
      words_per_minute: 320
      codelines_per_minute: 90
      ignore_languages:
        - mermaid
        - math

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.smartsymbols
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
      - name: mermaid
        class: mermaid
        format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.critic:
      mode: view
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - def_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js
  - javascripts/config.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  # 不蒜子：单页阅读量（静态站无法自建 PV，依赖第三方；与 navigation.instant 同用时可能需在切换后刷新才更新）
  - https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js

extra:
  # RSS：插件会生成两个 feed，顶栏两个图标分别对应
  rss_path: feed_rss_created.xml
  rss_path_updated: feed_rss_updated.xml
  giscus:
    # 1) 先在 https://giscus.app/ 配好后，把下面几项填进去
    repo: ycvenopyer/my-blog
    repo_id: "R_kgDORB9Tqg"        # 例如：R_kgDOxxxxxx
    category: "General"
    category_id: "DIC_kwDORB9Tqs4C60hX"    # 例如：DIC_kwDOxxxxxx

    # 2) 常用配置（一般不用改）
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 0
    input_position: bottom
    lang: zh-CN
    loading: lazy


hooks:
  - hooks.py # 站点统计
  
